version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: nest_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-nest_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nest_password}
      POSTGRES_DB: ${DB_NAME:-nest_db}
    ports:
      - '5435:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: nest_api_backend
    restart: always
    command: npm run start:dev
    ports:
      - '3000:3000'
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-nest_user}
      DB_PASSWORD: ${DB_PASSWORD:-nest_password}
      DB_NAME: ${DB_NAME:-nest_db}
    depends_on:
      - db

volumes:
  pgdata:
