name: Feature request
description: Propose an approved, reviewable product improvement
title: 'feat(scope): '
labels:
  - enhancement
  - status:needs-review
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched open and closed issues and found no duplicate.
          required: true
        - label: I understand this issue needs `status:approved` before a PR can be opened.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: What problem or limitation should this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and bounded scope.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - API contract
        - Customers
        - Products
        - Orders
        - Persistence
        - Tooling or documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Note other approaches or current workarounds.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add acceptance criteria, references, or other relevant details.
