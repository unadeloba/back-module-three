name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nest_user
          POSTGRES_PASSWORD: nest_password
          POSTGRES_DB: nest_db
        options: >-
          --health-cmd "pg_isready -U nest_user -d nest_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint && git diff --exit-code

      - name: Run unit tests with coverage
        run: npm run test:cov -- --runInBand

      - name: Run end-to-end tests
        run: npm run test:e2e -- --runInBand
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nest_user
          DB_PASSWORD: nest_password
          DB_NAME: nest_db

      - name: Build application
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy API to ECS
    needs: verify-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: us-east-1
      AWS_ROLE_ARN: arn:aws:iam::559846690180:role/phoenix-orders-demo-backend-deploy
      PROJECT_NAME: phoenix-orders-demo

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$PROJECT_NAME:${GITHUB_SHA}"
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

      - name: Register task definition and run migrations
        run: |
          set -euo pipefail
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          DB_VALUES="$(aws rds describe-db-instances --db-instance-identifier "$PROJECT_NAME" --query 'DBInstances[0].[Endpoint.Address,MasterUserSecret.SecretArn]' --output text)"
          read -r DB_HOST DB_SECRET_ARN <<< "$DB_VALUES"
          cat > task-definition.json <<EOF
          {
            "family": "$PROJECT_NAME",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "256",
            "memory": "512",
            "executionRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/$PROJECT_NAME-task-execution",
            "taskRoleArn": "arn:aws:iam::$ACCOUNT_ID:role/$PROJECT_NAME-task",
            "containerDefinitions": [{
              "name": "api",
              "image": "$IMAGE_URI",
              "essential": true,
              "portMappings": [{"containerPort": 3000, "protocol": "tcp"}],
              "environment": [
                {"name": "NODE_ENV", "value": "production"},
                {"name": "PORT", "value": "3000"},
                {"name": "DB_HOST", "value": "$DB_HOST"},
                {"name": "DB_PORT", "value": "5432"},
                {"name": "DB_NAME", "value": "phoenix_orders"}
              ],
              "secrets": [
                {"name": "DB_USERNAME", "valueFrom": "$DB_SECRET_ARN:username::"},
                {"name": "DB_PASSWORD", "valueFrom": "$DB_SECRET_ARN:password::"}
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/$PROJECT_NAME",
                  "awslogs-region": "$AWS_REGION",
                  "awslogs-stream-prefix": "api"
                }
              }
            }]
          }
          EOF
          TASK_DEFINITION_ARN="$(aws ecs register-task-definition --cli-input-json file://task-definition.json --query 'taskDefinition.taskDefinitionArn' --output text)"
          echo "TASK_DEFINITION_ARN=$TASK_DEFINITION_ARN" >> "$GITHUB_ENV"
          SUBNET_IDS="$(aws ec2 describe-subnets --filters "Name=tag:Project,Values=$PROJECT_NAME" "Name=tag:Tier,Values=public" --query 'Subnets[].SubnetId' --output text | tr '\t' ',')"
          SECURITY_GROUP_ID="$(aws ec2 describe-security-groups --filters "Name=group-name,Values=$PROJECT_NAME-ecs" --query 'SecurityGroups[0].GroupId' --output text)"
          echo "SUBNET_IDS=$SUBNET_IDS" >> "$GITHUB_ENV"
          echo "SECURITY_GROUP_ID=$SECURITY_GROUP_ID" >> "$GITHUB_ENV"
          MIGRATION_TASK_ARN="$(aws ecs run-task --cluster "$PROJECT_NAME" --launch-type FARGATE --task-definition "$TASK_DEFINITION_ARN" --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SECURITY_GROUP_ID],assignPublicIp=ENABLED}" --overrides '{"containerOverrides":[{"name":"api","command":["node","dist/migration-runner.js"]}]}' --query 'tasks[0].taskArn' --output text)"
          test "$MIGRATION_TASK_ARN" != "None"
          aws ecs wait tasks-stopped --cluster "$PROJECT_NAME" --tasks "$MIGRATION_TASK_ARN"
          MIGRATION_EXIT_CODE="$(aws ecs describe-tasks --cluster "$PROJECT_NAME" --tasks "$MIGRATION_TASK_ARN" --query 'tasks[0].containers[0].exitCode' --output text)"
          test "$MIGRATION_EXIT_CODE" = "0"

      - name: Create or update ECS service
        run: |
          set -euo pipefail
          TARGET_GROUP_ARN="$(aws elbv2 describe-target-groups --names "$PROJECT_NAME" --query 'TargetGroups[0].TargetGroupArn' --output text)"
          SERVICE_STATUS="$(aws ecs describe-services --cluster "$PROJECT_NAME" --services "$PROJECT_NAME" --query 'services[0].status' --output text)"
          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            aws ecs update-service --cluster "$PROJECT_NAME" --service "$PROJECT_NAME" --task-definition "$TASK_DEFINITION_ARN" --force-new-deployment
          else
            aws ecs create-service --cluster "$PROJECT_NAME" --service-name "$PROJECT_NAME" --task-definition "$TASK_DEFINITION_ARN" --desired-count 1 --launch-type FARGATE --health-check-grace-period-seconds 60 --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_IDS],securityGroups=[$SECURITY_GROUP_ID],assignPublicIp=ENABLED}" --load-balancers "targetGroupArn=$TARGET_GROUP_ARN,containerName=api,containerPort=3000"
          fi
          aws ecs wait services-stable --cluster "$PROJECT_NAME" --services "$PROJECT_NAME"
