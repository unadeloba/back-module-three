name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nest_user
          POSTGRES_PASSWORD: nest_password
          POSTGRES_DB: nest_db
        options: >-
          --health-cmd "pg_isready -U nest_user -d nest_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint && git diff --exit-code

      - name: Run unit tests with coverage
        run: npm run test:cov -- --runInBand

      - name: Run end-to-end tests
        run: npm run test:e2e -- --runInBand
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nest_user
          DB_PASSWORD: nest_password
          DB_NAME: nest_db

      - name: Build application
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
