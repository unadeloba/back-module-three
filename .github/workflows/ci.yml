name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: nest_user
          POSTGRES_PASSWORD: nest_password
          POSTGRES_DB: nest_db
        options: >-
          --health-cmd "pg_isready -U nest_user -d nest_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint checks
        run: npm run lint && git diff --exit-code

      - name: Run unit tests with coverage
        run: npm run test:cov -- --runInBand

      - name: Run end-to-end tests
        run: npm run test:e2e -- --runInBand
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nest_user
          DB_PASSWORD: nest_password
          DB_NAME: nest_db

      - name: Build application
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

  deploy:
    name: Deploy API to ECS
    needs: verify-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_BACKEND }}
      PROJECT_NAME: ${{ secrets.BACKEND_PROJECT_NAME }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$PROJECT_NAME:${GITHUB_SHA}"
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

          echo "Imagen subida exitosamente a ECR: $IMAGE_URI"
