name: Backend CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-and-package:
    name: Verify and package API
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: nest_user
          POSTGRES_PASSWORD: nest_password
          POSTGRES_DB: nest_db
        options: >-
          --health-cmd "pg_isready -U nest_user -d nest_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed by Gitleaks to scan full commit history

      # ─────────────────────────────────────────────
      # 1. SECRETS SCANNER — Gitleaks
      # Scans the FULL git history for hardcoded passwords, tokens or API keys.
      # Fails the pipeline immediately if any secret is found in any commit.
      # ─────────────────────────────────────────────
      - name: "[Security] Secrets Scanner - Gitleaks"
        run: |
          docker run --rm -v "${{ github.workspace }}:/path" zricethezav/gitleaks:latest detect --source="/path" -v

      # ─────────────────────────────────────────────
      # 2. VALIDACION DE ESTANDARES — Hadolint
      # Validates that the Dockerfile follows Docker/CIS best-practice
      # standards (pinned versions, non-root user, no latest tags, etc.).
      # ─────────────────────────────────────────────
      - name: "[Standards] Dockerfile Standards - Hadolint"
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ─────────────────────────────────────────────
      # 3. LINTERS — ESLint
      # Validates TypeScript code quality and style standards.
      # ─────────────────────────────────────────────
      - name: "[Linter] Code Linter - ESLint"
        run: npm run lint && git diff --exit-code

      # ─────────────────────────────────────────────
      # 4. VALIDACION DE ESTANDARES — Unit & E2E Tests with Coverage
      # Measures test coverage as a software quality standard.
      # ─────────────────────────────────────────────
      - name: "[Standards] Unit tests with coverage"
        run: npm run test:cov -- --runInBand

      - name: "[Standards] End-to-end tests"
        run: npm run test:e2e -- --runInBand
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: nest_user
          DB_PASSWORD: nest_password
          DB_NAME: nest_db

      - name: Build application
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      # ─────────────────────────────────────────────
      # 5. BUILD IMAGE (needed for runtime + image scan)
      # Build the final Docker image locally in the CI runner.
      # This image is used by both the runtime audit and the image-level
      # vulnerability scanner that follows.
      # ─────────────────────────────────────────────
      - name: Build Docker image for security audit
        run: docker build -t backend-runtime-check .

      # ─────────────────────────────────────────────
      # 6. SEGURIDAD EN TIEMPO DE EJECUCION — Docker Bench for Security
      # Audits the running container against CIS Docker Benchmark checks
      # (container runtime config, image hygiene, Docker daemon settings).
      # NOTE: Some host-level checks (auditd, kernel) will show [WARN] because
      # the GitHub Actions runner is a shared ephemeral VM — this is expected.
      # The relevant sections are "Container Images" and "Container Runtime".
      # The || true prevents pipeline failure while the team defines thresholds.
      # ─────────────────────────────────────────────
      - name: "[Security] Runtime Security - Docker Bench for Security"
        run: |
          docker run --rm --net host --pid host --userns host \
            --cap-add audit_control \
            -e DOCKER_CONTENT_TRUST=$DOCKER_CONTENT_TRUST \
            -v /var/lib:/var/lib:ro \
            -v /var/run/docker.sock:/var/run/docker.sock:ro \
            --label docker_bench_security \
            docker/docker-bench-security || true

      # ─────────────────────────────────────────────
      # 7. SCANNER DE VULNERABILIDADES — Trivy (filesystem + image)
      # - fs scan: detects CVEs in node_modules and source dependencies.
      # - image scan: detects CVEs in OS packages inside the final Docker image
      #   (e.g. libc6, zlib from the distroless base layer).
      # Fails the pipeline on CRITICAL or HIGH severity findings.
      # ─────────────────────────────────────────────
      - name: "[Security] Vulnerability Scanner - Trivy (filesystem)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: vuln

      - name: "[Security] Vulnerability Scanner - Trivy (Docker image)"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: backend-runtime-check
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          scanners: vuln

      # ─────────────────────────────────────────────
      # 8. SBOM — Software Bill of Materials (CycloneDX format)
      # Generates a complete inventory of all software components,
      # libraries, versions and licenses inside the project.
      # Uploaded as a GitHub artifact for audit and compliance traceability.
      # ─────────────────────────────────────────────
      - name: "[Security] Generate SBOM - Trivy CycloneDX"
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: cyclonedx
          output: sbom.json
          scanners: vuln

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90

  deploy:
    name: Deploy API to ECS
    needs: verify-and-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN_BACKEND }}
      PROJECT_NAME: ${{ secrets.BACKEND_PROJECT_NAME }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push immutable image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$PROJECT_NAME:${GITHUB_SHA}"
          docker build --tag "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"

          echo "Imagen subida exitosamente a ECR: $IMAGE_URI"

      # ─────────────────────────────────────────────
      # SEGURIDAD EN LA CADENA DE SUMINISTRO — cosign (keyless)
      # Signs the published Docker image using Sigstore cosign with GitHub OIDC.
      # No static private keys needed — the GitHub Actions token IS the identity.
      # The signature is pushed alongside the image in ECR and can be verified
      # by anyone with: cosign verify --certificate-identity-regexp=... <image>
      # ─────────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: "[Security] Sign image - cosign keyless (Supply Chain)"
        env:
          IMAGE_URI: ${{ env.IMAGE_URI }}
        run: |
          cosign sign --yes "$IMAGE_URI"

